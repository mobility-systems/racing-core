services:
  postgres:
    image: postgres:latest
    container_name: racing-core-database
    ports:
      - "9876:5432"
    environment:
      POSTGRES_USER: theodore
      POSTGRES_PASSWORD: theo7272
      POSTGRES_DB: racing-db
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  postgres_data: